<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  body {
    margin: 0;
    background: skyblue;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
  }

  canvas {
    display: block;
    margin: auto;
    background: #70c5ce;
  }
</style>
</head>
<body>

<h2>Flappy Bird 🐦 (اضغطي Space)</h2>
<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
  x: 80,
  y: 200,
  width: 20,
  height: 20,
  gravity: 0.6,
  lift: -10,
  velocity: 0
};

let pipes = [];
let score = 0;

// التحكم
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    bird.velocity = bird.lift;
  }
});

function createPipe() {
  let gap = 120;
  let top = Math.random() * 250;

  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + gap,
    width: 40
  });
}

function update() {
  // حركة الطائر
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // سقوط = خسارة
  if (bird.y > canvas.height || bird.y < 0) {
    alert("Game Over! Score: " + score);
    location.reload();
  }

  // المواسير
  for (let i = 0; i < pipes.length; i++) {
    pipes[i].x -= 2;

    // تصادم
    if (
      bird.x < pipes[i].x + pipes[i].width &&
      bird.x + bird.width > pipes[i].x &&
      (bird.y < pipes[i].top || bird.y + bird.height > pipes[i].bottom)
    ) {
      alert("Game Over! Score: " + score);
      location.reload();
    }

    // زيادة النقاط
    if (pipes[i].x === bird.x) {
      score++;
    }
  }

  // حذف المواسير القديمة
  pipes = pipes.filter(p => p.x > -40);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // الطائر
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, bird.width, bird.height);

  // المواسير
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, p.width, p.top);
    ctx.fillRect(p.x, p.bottom, p.width, canvas.height);
  });

  // النقاط
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);
}

setInterval(() => {
  update();
  draw();
}, 20);

// كل شوية يطلع ماسورة
setInterval(createPipe, 1500);
</script>

</body>
</html>
